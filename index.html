<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>90° — Studio Créatif Événementiel</title>
<meta name="description" content="90° crée des expériences musicales et culturelles dans les lieux les plus singuliers de Genève.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #E4E2DD;
  --text: #0A0A0A;
  --text-muted: #6B6965;
  --line: rgba(10,10,10,0.12);
  --font: 'Chakra Petch', sans-serif;
}

/* Mode nuit (18h - 6h) : Club */
body.night-mode {
  --bg: #0A0A0A;
  --text: #E4E2DD;
  --text-muted: #8A8680;
  --line: rgba(228,226,221,0.12);
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  
  transition: background 1.5s ease, color 1.5s ease;
}

/* ─── CUSTOM CURSOR 90° ─── */

/* ─── SIDEBAR ─── */
.sidebar {
  position: fixed;
  left: 0; top: 0;
  width: 56px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 24px 0;
  z-index: 100;
  border-right: 1px solid var(--line);
}

.sidebar-logo {
  font-family: var(--font);
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 2px;
  writing-mode: vertical-rl;
  text-orientation: mixed;
  transform: rotate(180deg);
  color: var(--text);
  text-decoration: none;
}

.sidebar-links {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

.sidebar-links a {
  color: var(--text);
  text-decoration: none;
  opacity: 0.5;
  transition: opacity 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  height: 24px;
}

.sidebar-links a:hover { opacity: 1; }

.sidebar-links svg {
  width: 18px;
  height: 18px;
  fill: currentColor;
}

/* ─── MODE INDICATOR ─── */
.mode-indicator {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #E8A838;
  transition: background 1.5s ease;
  box-shadow: 0 0 6px rgba(232,168,56,0.4);
}
body.night-mode .mode-indicator {
  background: #6B7FFF;
  box-shadow: 0 0 6px rgba(107,127,255,0.4);
}

/* ─── MAIN CONTENT ─── */
.main {
  margin-left: 56px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ─── HERO TITLE ─── */
.hero-title {
  padding: 60px 60px 0;
  text-align: center;
}

.hero-logo {
  width: clamp(180px, 24vw, 300px);
  height: auto;
  animation: fadeUp 0.8s ease forwards;
  mix-blend-mode: multiply;
  transition: filter 1.5s ease;
}

body.night-mode .hero-logo {
  mix-blend-mode: screen;
  filter: invert(1);
}

body.night-mode 

body.night-mode .newsletter-form input[type="email"] {
  border-color: var(--line);
  color: var(--text);
}

body.night-mode .newsletter-form button {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
}

body.night-mode .newsletter-form button:hover {
  background: transparent;
  color: var(--text);
}

/* ─── NAV ROWS ─── */
.nav-rows {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 40px 0 0;
}

.nav-row {
  border-top: 1px solid var(--line);
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  text-decoration: none;
  color: var(--text);
  transition: background 0.4s;
  min-height: 90px;
}

.nav-row:last-child {
  border-bottom: 1px solid var(--line);
}

.nav-row-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transition: opacity 0.5s ease;
  z-index: 1;
}

.nav-row-overlay {
  position: absolute;
  inset: 0;
  background: rgba(10,10,10,0.4);
  opacity: 0;
  transition: opacity 0.5s ease;
  z-index: 2;
}

.nav-row:hover .nav-row-bg { opacity: 1; }
.nav-row:hover .nav-row-overlay { opacity: 1; }
.nav-row:hover .nav-row-text { color: #fff; }

.nav-row-text {
  font-family: var(--font);
  font-weight: 700;
  font-size: clamp(28px, 5vw, 56px);
  text-transform: uppercase;
  letter-spacing: 4px;
  position: relative;
  z-index: 3;
  transition: color 0.4s, transform 0.3s;
}

.nav-row:hover .nav-row-text {
  transform: scale(1.02);
}

/* ─── NEWSLETTER SECTION ─── */
.newsletter-section {
  padding: 48px 60px;
  text-align: center;
  border-top: 1px solid var(--line);
}

.newsletter-section p {
  font-family: var(--font);
  font-weight: 400;
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 16px;
}

.newsletter-form {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 0;
  max-width: 420px;
  margin: 0 auto;
}

.newsletter-form input[type="email"] {
  font-family: var(--font);
  font-size: 14px;
  padding: 12px 16px;
  border: 1px solid var(--line);
  border-right: none;
  background: transparent;
  color: var(--text);
  outline: none;
  flex: 1;
  letter-spacing: 1px;
}

.newsletter-form input[type="email"]::placeholder {
  color: var(--text-muted);
  opacity: 0.6;
}

.newsletter-form button {
  font-family: var(--font);
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 12px 20px;
  border: 1px solid var(--text);
  background: var(--text);
  color: var(--bg);
  cursor: pointer;
  transition: background 0.3s, color 0.3s;
}

.newsletter-form button:hover {
  background: transparent;
  color: var(--text);
}

/* ─── FOOTER ─── */
.footer {
  padding: 32px 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
  border-top: 1px solid var(--line);
}

.footer-left {
  font-family: var(--font);
  font-size: 11px;
  letter-spacing: 1px;
  color: var(--text-muted);
}

.footer-nav {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
}

.footer-nav a {
  font-family: var(--font);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  text-decoration: none;
  transition: color 0.3s;
}

.footer-nav a:hover { color: var(--text); }

/* ─── PLUS BUTTON ─── */
.nav-row-plus {
  cursor: pointer;
  position: relative;
}

.plus-arrow {
  position: absolute;
  right: 40px;
  font-family: var(--font);
  font-weight: 300;
  font-size: clamp(20px, 3vw, 32px);
  color: var(--text-muted);
  transition: transform 0.4s ease;
}

.plus-arrow.open {
  transform: rotate(45deg);
}

/* ─── SUB-MENU ─── */
.sub-menu {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s ease;
  border-bottom: 1px solid var(--line);
}

.sub-menu.open {
  max-height: 400px;
}

.sub-row {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px 0;
  border-top: 1px solid var(--line);
  font-family: var(--font);
  font-weight: 600;
  font-size: clamp(16px, 2.5vw, 24px);
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--text-muted);
  text-decoration: none;
  transition: color 0.3s, background 0.3s;
}

.sub-row:hover {
  color: var(--text);
  background: rgba(0,0,0,0.03);
}

/* ─── COUNTDOWN ─── */
.countdown-section {
  padding: 48px 60px;
  text-align: center;
  border-top: 1px solid var(--line);
}
.countdown-label {
  font-family: var(--font);
  font-weight: 400;
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.countdown-timer {
  font-family: var(--font);
  font-weight: 700;
  font-size: clamp(24px, 4vw, 48px);
  letter-spacing: 4px;
  color: var(--text);
}
.countdown-timer .countdown-unit {
  display: inline-block;
  min-width: 60px;
  text-align: center;
}
.countdown-timer .countdown-unit small {
  display: block;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 2px;
  color: var(--text-muted);
  margin-top: 4px;
}
.countdown-timer .countdown-sep {
  opacity: 0.3;
  margin: 0 4px;
}
.countdown-msg {
  font-style: italic;
  font-weight: 400;
  opacity: 0.6;
}
.countdown-cta {
  font-family: var(--font);
  font-size: 12px;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-top: 12px;
}

/* ─── PAGE TRANSITION 90° ─── */
.page-transition {
  position: fixed;
  inset: 0;
  background: var(--text);
  z-index: 1000;
  transform-origin: top left;
  transform: scaleX(0);
  pointer-events: none;
}
.page-transition.active {
  animation: sweep90 0.6s cubic-bezier(0.77, 0, 0.175, 1) forwards;
}
@keyframes sweep90 {
  0% { transform: scaleX(0); transform-origin: left; }
  45% { transform: scaleX(1); transform-origin: left; }
  55% { transform: scaleX(1); transform-origin: right; }
  100% { transform: scaleX(0); transform-origin: right; }
}

/* ─── TYPED TEXT 120 BPM ─── */
.typed-text {
  overflow: hidden;
  white-space: nowrap;
  border-right: 2px solid var(--text);
  animation: typing 1.5s steps(30) forwards, blink 0.5s step-end infinite;
  width: 0;
  display: inline-block;
}
@keyframes typing {
  from { width: 0; }
  to { width: 100%; }
}
@keyframes blink {
  50% { border-color: transparent; }
}

/* ─── EASTER EGG ─── */
.easter-egg-flash {
  position: fixed;
  inset: 0;
  background: #fff;
  z-index: 10000;
  pointer-events: none;
  opacity: 0;
}
.easter-egg-flash.active {
  animation: easterFlash 0.8s ease forwards;
}
@keyframes easterFlash {
  0% { opacity: 0; }
  10% { opacity: 1; }
  20% { opacity: 0; }
  30% { opacity: 0.8; }
  40% { opacity: 0; }
  60% { opacity: 0.4; }
  100% { opacity: 0; }
}
.easter-egg-text {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: var(--font);
  font-weight: 700;
  font-size: clamp(48px, 10vw, 120px);
  color: var(--text);
  z-index: 10001;
  pointer-events: none;
  opacity: 0;
  text-transform: uppercase;
  letter-spacing: 8px;
}
.easter-egg-text.active {
  animation: easterText 1.2s ease forwards;
}
@keyframes easterText {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3) rotate(0deg); }
  15% { opacity: 1; transform: translate(-50%, -50%) scale(1.2) rotate(0deg); }
  40% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
  70% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(90deg); }
  85% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1) rotate(90deg); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8) rotate(90deg); }
}

/* ─── MOBILE ─── */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { margin-left: 0; }
  
  .hero-title { padding: 40px 20px 0; }
  .hero-logo { width: 140px !important; }
  
  .nav-rows { padding: 20px 0 0; }
  .nav-row { min-height: 80px; }
  .nav-row-text { 
    font-size: 32px;
    letter-spacing: 3px; 
  }
  
  .plus-arrow { right: 24px; font-size: 20px; }
  
  .sub-row {
    padding: 16px 0;
    font-size: 16px;
    letter-spacing: 2px;
  }
  
  .countdown-section { padding: 32px 20px; }
  .countdown-timer { font-size: 28px; letter-spacing: 2px; }
  
  .newsletter-section { padding: 32px 20px; }
  .newsletter-form { 
    flex-direction: column; 
    max-width: 100%;
    gap: 0;
  }
  .newsletter-form input[type="email"] { 
    border-right: 1px solid var(--line); 
    border-bottom: none;
    padding: 14px 16px;
    font-size: 16px;
  }
  .newsletter-form button { 
    width: 100%;
    padding: 14px 20px;
  }
  
  .footer { 
    padding: 24px 20px 80px; /* extra padding for mobile nav bar */
    flex-direction: column; 
    text-align: center;
    gap: 12px;
  }
  .footer-nav { justify-content: center; gap: 16px; }
  .footer-nav a { font-size: 10px; }
  
  /* Mobile nav bar */
  .mobile-nav {
    display: flex;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--bg);
    border-top: 1px solid var(--line);
    justify-content: space-around;
    align-items: center;
    padding: 14px 0;
    z-index: 100;
    transition: background 1.5s ease;
  }
  
  .mobile-nav a {
    font-family: var(--font);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.3s;
  }
  
  .mobile-nav a:active { color: var(--text); }
  
  
  
  /* Easter egg text smaller on mobile */
  .easter-egg-text { font-size: 60px !important; }
  
  /* Mode indicator in mobile nav */
  .mode-indicator-mobile {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #E8A838;
    transition: background 1.5s ease;
  }
  body.night-mode .mode-indicator-mobile {
    background: #6B7FFF;
  }
}

@media (min-width: 769px) {
  .mobile-nav { display: none; }
}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.nav-row {
  opacity: 1;
  animation: fadeUp 0.6s ease forwards;
}

/* nav-row animations handled by JS typed text */
</style>
</head>

<main class="main">

<script>
// ═══ MODE JOUR/NUIT (SUNSET 6h-18h / CLUB 18h-6h) ═══
function updateDayNightMode() {
  const hour = new Date().getHours();
  const isNight = hour >= 18 || hour < 6;
  const body = document.body;
  
  if (isNight && !body.classList.contains('night-mode')) {
    body.classList.add('night-mode');
    // Swap nav order: Club first at night
    const navRows = document.querySelector('.nav-rows');
    const clubRow = navRows.querySelector('a[href="club.html"]');
    const sunsetRow = navRows.querySelector('a[href="sunset.html"]');
    if (clubRow && sunsetRow && navRows.firstElementChild !== clubRow) {
      navRows.insertBefore(clubRow, sunsetRow);
    }
  } else if (!isNight && body.classList.contains('night-mode')) {
    body.classList.remove('night-mode');
    // Swap nav order: Sunset first during day
    const navRows = document.querySelector('.nav-rows');
    const clubRow = navRows.querySelector('a[href="club.html"]');
    const sunsetRow = navRows.querySelector('a[href="sunset.html"]');
    if (sunsetRow && clubRow && navRows.firstElementChild !== sunsetRow) {
      navRows.insertBefore(sunsetRow, clubRow);
    }
  }
}

// Init + check every minute
updateDayNightMode();
setInterval(updateDayNightMode, 60000);

// ═══ CUSTOM CURSOR 90° ═══
// ═══ PLUS MENU ═══
function togglePlus() {
  document.getElementById('subMenu').classList.toggle('open');
  document.getElementById('plusArrow').classList.toggle('open');
}

// ═══ PAGE TRANSITION 90° ═══
document.querySelectorAll('.nav-row:not(.nav-row-plus), .sub-row').forEach(link => {
  link.addEventListener('click', (e) => {
    const href = link.getAttribute('href');
    if (href && href.startsWith('#')) return; // skip anchors for now
    e.preventDefault();
    const transition = document.getElementById('pageTransition');
    transition.classList.add('active');
    setTimeout(() => {
      if (href) window.location.href = href;
    }, 350);
    setTimeout(() => {
      transition.classList.remove('active');
    }, 700);
  });
});

// ═══ TYPED TEXT AT 120 BPM ═══
// CSS reveal approach - links stay clickable the whole time
document.querySelectorAll('.nav-row-text').forEach((el, i) => {
  const text = el.textContent;
  const bpm = 120;
  const beatMs = 60000 / bpm;
  const charMs = beatMs / 8;
  const totalMs = text.length * charMs;
  
  // Set initial clip to hide text
  el.style.clipPath = 'inset(0 100% 0 0)';
  el.style.transition = 'none';
  
  setTimeout(() => {
    el.style.transition = `clip-path ${totalMs}ms steps(${text.length})`;
    el.style.clipPath = 'inset(0 0% 0 0)';
  }, i * beatMs + 200);
});

// ═══ COUNTDOWN TIMER ═══
// Set nextEventDate to null if no event planned, or to a Date object
const nextEventDate = null; // Example: new Date('2026-06-15T18:00:00')

function updateCountdown() {
  const container = document.getElementById('countdownTimer');
  if (!nextEventDate) {
    container.innerHTML = '<span class="countdown-msg">Bientôt.</span>';
    return;
  }
  
  const now = new Date();
  const diff = nextEventDate - now;
  
  if (diff <= 0) {
    container.innerHTML = '<span class="countdown-msg">C\'est maintenant.</span>';
    return;
  }
  
  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const secs = Math.floor((diff % (1000 * 60)) / 1000);
  
  container.innerHTML = 
    `<span class="countdown-unit">${String(days).padStart(2,'0')}<small>JOURS</small></span>` +
    `<span class="countdown-sep">:</span>` +
    `<span class="countdown-unit">${String(hours).padStart(2,'0')}<small>HEURES</small></span>` +
    `<span class="countdown-sep">:</span>` +
    `<span class="countdown-unit">${String(mins).padStart(2,'0')}<small>MIN</small></span>` +
    `<span class="countdown-sep">:</span>` +
    `<span class="countdown-unit">${String(secs).padStart(2,'0')}<small>SEC</small></span>`;
}

updateCountdown();
setInterval(updateCountdown, 1000);

// ═══ DAY/NIGHT MODE ═══
function updateMode() {
  const hour = new Date().getHours();
  const isDay = hour >= 6 && hour < 18;
  document.body.classList.toggle('night-mode', !isDay);
  const indicator = document.getElementById('modeIndicator');
  if (indicator) {
    indicator.style.background = isDay ? '#C4A265' : '#5B8FB9';
    indicator.title = isDay ? 'Mode Sunset' : 'Mode Club';
  }
}
updateMode();
setInterval(updateMode, 60000);

</script>
